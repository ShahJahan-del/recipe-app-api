version: "3.9"

services:
  app:
    build:
      context: .
      args:
        - DEV=true
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app
      - dev-static-data:/vol/web
    command: >
      sh -c "python manage.py wait_for_db &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000 --noreload"
    environment:
          - DB_HOST=db
          - DB_HOST=db
          - DB_NAME=devdb
          - DB_NAME=devdb
          - DB_USER=devuser
          - DB_USER=devuser
          - DB_PASS=changeme
          - DB_PASS=changeme
          - DEBUG=1
          - REDIS_URL=redis://redis:6379/0 #Websockets
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    volumes:
      - dev-db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=devdb
      - POSTGRES_USER=devuser
      - POSTGRES_PASSWORD=changeme

  redis:
    image: redis:latest
    restart: always
    ports:
      - "6379:6379"
    networks:
      - default

volumes:
  dev-db-data:
  dev-static-data:


